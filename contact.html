<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>İletişim | Taha</title>
    <style>
        /* --- NAVBAR REDESIGN --- */
        nav {
            background-color: #2c3e50; /* Form butonuyla uyumlu koyu renk */
            padding: 15px 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); /* Hafif derinlik */
            margin-bottom: 30px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-weight: bold;
            padding: 10px 20px; /* Tıklama alanını genişletir */
            margin: 0 5px;
            transition: all 0.3s ease;
            border-radius: 5px;
        }

        nav a:hover {
            background-color: #34495e; /* Üzerine gelince hafif renk değişimi */
            color: #2ecc71; /* Vurgu rengi */
        }

        /* Mevcut Form Stilleri (Korundu) */
        .contact-container {
            width: 600px;
            margin: 0 auto 40px auto;
            padding: 25px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-family: Arial, sans-serif;
            background-color: #ffffff;
        }

        .contact-container input[type="text"], 
        .contact-container input[type="email"], 
        .contact-container input[type="password"],
        .contact-container input[type="file"],
        .contact-container select, 
        .contact-container textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .contact-container label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .checkbox-group {
            margin-bottom: 15px;
            padding: 10px;
            background-color: #f9f9f9;
            border-radius: 4px;
        }
        
        .checkbox-item {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }

        .checkbox-item input {
            width: auto !important;
            margin-right: 10px;
        }

        .contact-container button[type="submit"] {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }

        footer { text-align: center; padding: 20px; color: #777; font-family: Arial; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Ana Sayfa</a>
        <a href="about.html">Hakkımda</a>
        <a href="interests.html">İlgi Alanlarım</a>
        <a href="contact.html">İletişim</a>
    </nav>

    <main>
        <h1 style="text-align:center; font-family: Arial;">İletişim ve Başvuru Formu</h1>

        <div class="contact-container">
            <form action="#" method="post">
                <label for="ad">Ad Soyad</label>
                <input type="text" id="ad" name="name" placeholder="Adınız Soyadınız" required>

                <label for="email">E-posta</label>
                <input type="email" id="email" name="email" placeholder="ornek@mail.com" required>

                <label for="sifre">Başvuru Takip Şifresi</label>
                <input type="password" id="sifre" name="password" placeholder="Bir şifre belirleyin" required>

                <label for="konu">Konu</label>
                <select id="konu" name="subject">
                    <option value="is">İş Teklifi</option>
                    <option value="soru">Soru</option>
                    <option value="geri-bildirim">Geri Bildirim</option>
                </select>

                <label>İlgi Alanlarınız</label>
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="ai" name="interest"><label for="ai">Yapay Zeka</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="web" name="interest"><label for="web">Web Geliştirme</label>
                    </div>
                </div>

                <label for="dosya">Özgeçmiş Yükle</label>
                <input type="file" id="dosya" name="resume">

                <label for="mesaj">Mesaj</label>
                <textarea id="mesaj" name="message" rows="4"></textarea>

                <div class="checkbox-item">
                    <input type="checkbox" id="kvkk" required>
                    <label for="kvkk" style="font-size: 12px;">KVKK onaylıyorum.</label>
                </div>

                <button type="submit">Başvuruyu Gönder</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Taha - Tüm Hakları Saklıdır.</p>
    </footer>

</body>
</html>
